global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: ollama
    static_configs:
      - targets: ["ollama:9110"]
    metrics_path: /metrics
    scrape_timeout: 10s

  # Smart router — primary edge metrics (latency, RPS, status codes)
  - job_name: router
    metrics_path: /metrics
    static_configs:
      - targets: ["router:4001"]
    scrape_timeout: 5s
