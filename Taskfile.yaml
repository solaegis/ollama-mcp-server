version: "3"

# Applies to all tasks: hides go-task command echo lines. Child commands (npm, pytest)
# still print their own stdout unless redirected. Set silent: false on a task to override.
silent: true

vars:
  # Default: native Ollama on host (Metal) + hybrid-host overrides (host.docker.internal).
  COMPOSE: docker compose -f docker/compose.yaml -f docker/compose.hybrid-host.yaml --env-file .env
  # Linux Ollama container only — do not merge hybrid-host (conflicts with native :11434).
  COMPOSE_CONTAINER_OLLAMA: docker compose -f docker/compose.yaml --env-file .env --profile docker-ollama
  REPO_DIR:
    sh: pwd
  OLLAMA_URL: http://localhost:11434
  OLLAMA_ORB: http://ollama.ollama-stack.orb.local:11434
  # Compose service name `router` — resolves reliably on OrbStack (container_name variant may not)
  ROUTER_ORB: http://router.ollama-stack.orb.local:4001

tasks:
  # ─── Default ──────────────────────────────────────────────────
  default:
    desc: Show available tasks
    cmds: [task --list]

  # ─── MCP Server ───────────────────────────────────────────────
  build:
    desc: Install deps and build TypeScript MCP server
    cmds:
      - npm install
      - npm run build

  inspect:
    desc: Launch MCP Inspector (browser UI for testing tools interactively)
    deps: [build]
    cmds:
      - npm run inspect

  dev:
    desc: Watch mode — rebuild on source changes
    cmds:
      - npm run dev

  # ─── Docker stack ─────────────────────────────────────────────
  up:
    desc: Start stack (router, Web UI, metrics) using native Ollama on host :11434 — start Ollama.app/brew first
    cmds:
      - cp -n .env.example .env 2>/dev/null || true
      - "{{.COMPOSE}} up -d --remove-orphans"
      - task: _wait-ollama
      - task: status

  up-container-ollama:
    desc: Start stack with Linux Ollama in Docker (CPU in VM on Mac) — stop native Ollama or avoid port 11434 conflict
    cmds:
      - cp -n .env.example .env 2>/dev/null || true
      - "{{.COMPOSE_CONTAINER_OLLAMA}} up -d --remove-orphans"
      - task: _wait-ollama
      - task: status

  update:
    desc: Pull latest images for router, Web UI, Prometheus, Grafana (default stack; no container Ollama)
    cmds:
      - "{{.COMPOSE}} pull router open-webui prometheus grafana"
      - "{{.COMPOSE}} up -d --remove-orphans"
      - echo "Stack images updated. Native Ollama — upgrade via host (brew / Ollama.app)."

  update-container-ollama:
    desc: Pull latest ollama/ollama image and restart the ollama container (use with task up-container-ollama)
    cmds:
      - "{{.COMPOSE_CONTAINER_OLLAMA}} pull ollama"
      - "{{.COMPOSE_CONTAINER_OLLAMA}} up -d --remove-orphans ollama"
      - task: _wait-ollama
      - echo "Container Ollama updated. Run 'task pull -- <model>' to pull any missing models."

  down:
    desc: Stop stack (volumes preserved)
    cmds: ["{{.COMPOSE}} down"]

  down-container-ollama:
    desc: Stop stack started with task up-container-ollama (compose + docker-ollama profile)
    cmds: ["{{.COMPOSE_CONTAINER_OLLAMA}} down"]

  restart:
    desc: "Restart a service: task restart -- router (ollama only exists with task up-container-ollama)"
    cmds: ["{{.COMPOSE}} restart {{.CLI_ARGS}}"]

  logs:
    desc: "Follow logs: task logs -- ollama"
    cmds: ["{{.COMPOSE}} logs -f --tail=100 {{.CLI_ARGS}}"]

  status:
    desc: Show running containers and service endpoints
    cmds:
      - "{{.COMPOSE}} ps"
      - |
        echo ""
        echo "Stack mode: native Ollama on host (containers use host.docker.internal:11434)."
        echo "  For Linux Ollama in Docker instead: task up-container-ollama"
        echo ""
        echo "Endpoints (localhost):"
        echo "  Ollama API     -> http://localhost:11434 (native on host)"
        echo "  Metrics Exp.   -> http://localhost:9110/metrics"
        echo "  Smart Router   -> http://localhost:4001"
        echo "  Chat UI        -> http://localhost:8080"
        echo "  Grafana        -> http://localhost:3001  (login: admin / admin)"
        echo "  Prometheus     -> http://localhost:9090"
        echo ""
        echo "Endpoints (OrbStack — use these in Cursor/IDE to avoid SSRF blocks):"
        echo "  Ollama API     -> {{.OLLAMA_ORB}}"
        echo "  Smart Router   -> {{.ROUTER_ORB}}/v1"

  grafana:
    desc: Open Grafana in the browser (stack must be running — task up)
    cmds:
      - |
        if ! curl -sf --max-time 4 http://localhost:3001/api/health >/dev/null 2>&1; then
          echo "Grafana is not reachable at http://localhost:3001"
          echo "Start the stack: task up"
          echo "If the stack is up but this persists: docker logs grafana --tail 50"
          exit 1
        fi
      - open http://localhost:3001

  reset:
    desc: "Stop stack AND delete all volumes (destructive)"
    prompt: "Delete all model data and volumes? This cannot be undone."
    cmds: ["{{.COMPOSE}} down -v"]

  # ─── OrbStack hostname check ──────────────────────────────────
  orb-check:
    desc: Verify OrbStack hostnames and container status
    cmds:
      - |
        echo "=== Ollama (native on host — default stack) ==="
        if curl -sf --max-time 3 http://localhost:11434/api/tags >/dev/null 2>&1; then
          echo "OK  -> http://localhost:11434"
        else
          echo "FAIL -> start native Ollama on the host, then: task up"
          echo "      (or use in-container Ollama: task up-container-ollama)"
        fi
        echo ""
        echo "=== Ollama OrbStack hostname ==="
        if curl -sf --max-time 3 http://ollama.ollama-stack.orb.local:11434/api/tags >/dev/null 2>&1; then
          echo "  OK  -> http://ollama.ollama-stack.orb.local:11434"
        else
          echo "  --     http://ollama.ollama-stack.orb.local:11434"
        fi
        echo ""
        echo "=== Router container ==="
        docker inspect ollama-router --format "  status={{.State.Status}} healthy={{.State.Health.Status}}" 2>/dev/null || echo "  not found - run: task up"
        echo ""
        echo "=== Router hostname variants ==="
        for host in "ollama-router.ollama-stack.orb.local" "router.ollama-stack.orb.local" "ollama-router.orb.local"; do
          if curl -sf --max-time 2 "http://${host}:4001/health" >/dev/null 2>&1; then
            echo "  OK  -> http://${host}:4001"
          else
            echo "  --     http://${host}:4001"
          fi
        done
        echo ""
        echo "=== Localhost (task router-test uses this) ==="
        if curl -sf --max-time 2 "http://localhost:4001/health" >/dev/null 2>&1; then
          echo "  OK  -> http://localhost:4001"
        else
          echo "  FAIL -> try: task restart -- router"
        fi

  # ─── Model management ─────────────────────────────────────────
  pull:
    desc: "Pull a model: task pull -- gemma4:latest"
    cmds:
      - |
        MODEL="{{.CLI_ARGS}}"
        if [ -z "$MODEL" ]; then
          echo "Usage: task pull -- <model>"
          echo "Browse models: https://ollama.com/library"
          exit 1
        fi
        if ! curl -sf {{.OLLAMA_URL}}/api/tags >/dev/null 2>&1; then
          echo "ERROR: Ollama not reachable at {{.OLLAMA_URL}}"
          echo "Start native Ollama on the host, then run 'task up' (or use task up-container-ollama)"
          exit 1
        fi
        echo "Pulling $MODEL (this may take a while)..."
        curl -f {{.OLLAMA_URL}}/api/pull \
          -H "Content-Type: application/json" \
          -d "{\"name\":\"$MODEL\"}" \
          --no-buffer \
          | grep -o '"status":"[^"]*"' \
          | sed 's/"status":"//;s/"//' \
          | uniq
        echo "Done: $MODEL"

  warm:
    desc: "Preload models into RAM with 24h keep-alive. Usage: task warm -- model1 model2 ... (falls back to DEFAULT_MODELS if empty)"
    cmds:
      - |
        MODELS="{{.CLI_ARGS}}"
        if [ -z "$MODELS" ]; then
          if [ ! -f .env ]; then echo "No .env found and no models provided"; exit 1; fi
          MODELS=$(grep "^DEFAULT_MODELS=" .env | cut -d'=' -f2 | tr ',' ' ')
        fi
        if [ -z "$MODELS" ]; then echo "No models provided and no DEFAULT_MODELS found"; exit 1; fi
        
        # Get list of pulled models to avoid warming non-existent ones
        PULLED=$(curl -sf {{.OLLAMA_URL}}/api/tags | python3 -c "import sys, json; print(' '.join(m['name'] for m in json.load(sys.stdin).get('models', [])))" 2>/dev/null)
        
        for m in $MODELS; do
          # Check if model is pulled
          if [[ ! " $PULLED " =~ " $m " ]]; then
            echo "Skipping $m (not found). Pull it first: task pull -- $m"
            continue
          fi

          echo "Warming $m..."
          # Use a longer timeout for large models and don't fail the whole loop if one model errors
          STATUS=$(printf '{"model": "%s", "prompt": "warm", "keep_alive": "24h", "stream": false}' "$m" \
            | curl -s -w "%{http_code}" -X POST {{.OLLAMA_URL}}/api/generate -H "Content-Type: application/json" -d @- -o /dev/null)
          
          if [ "$STATUS" -eq 200 ]; then
            echo "  OK: $m is ready."
          else
            echo "  ERROR: Failed to warm $m (HTTP $STATUS)"
          fi
        done
        echo "Warm-up process complete."

  list:
    desc: List all locally available models
    cmds:
      - |
        if ! curl -sf {{.OLLAMA_URL}}/api/tags >/dev/null 2>&1; then
          echo "ERROR: Ollama not reachable at {{.OLLAMA_URL}} — start native Ollama, then task up"
          exit 1
        fi
        curl -sf {{.OLLAMA_URL}}/api/tags \
          | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        models = data.get('models', [])
        if not models:
            print('No models pulled yet. Run: task pull -- <model>')
        else:
            print(f\"{'NAME':<45} {'PARAMS':<10} SIZE\")
            print('-' * 65)
            for m in models:
                name = m['name']
                params = m.get('details', {}).get('parameter_size', '?')
                size = f\"{m['size'] / 1e9:.1f} GB\"
                print(f'{name:<45} {params:<10} {size}')
        "

  ps:
    desc: Show models currently loaded in memory
    cmds:
      - |
        if ! curl -sf {{.OLLAMA_URL}}/api/tags >/dev/null 2>&1; then
          echo "ERROR: Ollama not reachable at {{.OLLAMA_URL}} — start native Ollama, then task up"
          exit 1
        fi
        curl -sf {{.OLLAMA_URL}}/api/ps \
          | python3 -c "
        import sys, json
        data = json.load(sys.stdin)
        models = data.get('models', [])
        if not models:
            print('No models currently loaded in memory')
        else:
            print(f\"{'NAME':<45} VRAM\")
            print('-' * 55)
            for m in models:
                name = m['name']
                vram = f\"{m.get('size_vram', 0) / 1e9:.1f} GB\"
                print(f'{name:<45} {vram}')
        "

  rm-model:
    desc: "Delete a local model: task rm-model -- phi4:latest"
    cmds:
      - |
        MODEL="{{.CLI_ARGS}}"
        if [ -z "$MODEL" ]; then
          echo "Usage: task rm-model -- <model>"
          exit 1
        fi
        curl -sf -X DELETE {{.OLLAMA_URL}}/api/delete \
          -H "Content-Type: application/json" \
          -d "{\"name\":\"$MODEL\"}" \
          && echo "Deleted: $MODEL" \
          || echo "ERROR: could not delete $MODEL (not found or Ollama unreachable)"

  # ─── Smart router ─────────────────────────────────────────────
  router-test:
    desc: "Test routing for a prompt: task router-test -- write a patent memo"
    cmds:
      - python3 scripts/router_test.py {{.CLI_ARGS}}

  router-models:
    desc: Show the full routing table
    cmds:
      - python3 scripts/router_models.py

  router-dev:
    desc: Run the smart router locally (outside Docker) for development
    cmds:
      - uv sync --group dev
      - |
        OLLAMA_BASE_URL=http://localhost:11434 \
        uv run uvicorn router.server:app --port 4001 --reload

  metrics-exporter:
    desc: Run the Ollama metrics exporter locally (outside Docker)
    cmds:
      - uv sync
      - uv run python scripts/ollama_metrics_exporter.py

  # ─── VS Code extension ────────────────────────────────────────
  ext-install:
    desc: Build, package, and install the extension into Cursor
    dir: vscode-extension
    cmds:
      - npm install
      - npm run compile
      - npm run package
      - |
        VSIX=$(ls -t ollama-local-llm-*.vsix 2>/dev/null | head -1)
        if [ -z "$VSIX" ]; then
          echo "ERROR: no .vsix found after packaging"
          exit 1
        fi
        cursor --install-extension "$VSIX"
        echo "Installed $VSIX into Cursor"

  ext-package:
    desc: Package extension as .vsix only (no install)
    dir: vscode-extension
    cmds:
      - npm install
      - npm run compile
      - npm run package

  ext-dev:
    desc: Watch mode for extension TypeScript
    dir: vscode-extension
    cmds:
      - npm run watch

  # ─── Automated tests (no Ollama required) ───────────────────
  test:
    desc: Run ruff + pytest + npm build (uv sync --group dev)
    cmds:
      - uv sync --group dev
      - uv run ruff check router tests
      - uv run ruff format --check router tests
      - uv run pytest tests/ -q
      - task: build

  # ─── Quick tests ──────────────────────────────────────────────
  test-ollama:
    desc: Smoke-test direct Ollama connection
    cmds:
      - task: list

  # ─── Setup helpers ────────────────────────────────────────────
  setup-cursor:
    desc: Write MCP + OpenAI provider config to Cursor settings (optional OLLAMA_MCP_USE_ORB_DNS=1 for OrbStack router hostname in MCP)
    deps: [build]
    cmds:
      - python3 "{{.REPO_DIR}}/scripts/setup_cursor_config.py" "{{.REPO_DIR}}"

  sync-cursor-models:
    desc: Write ~/.cursor/ollama-router-model-list.json and probe GET /v1/models (Cursor discovers models via API)
    cmds:
      - uv run python scripts/sync_cursor_models.py

  setup-claude-code:
    desc: Register MCP server with Claude Code (user scope — available in all projects)
    deps: [build]
    cmds:
      - |
        claude mcp add ollama \
          --scope user \
          -e OLLAMA_BASE_URL=http://localhost:11434 \
          -e ROUTER_BASE_URL=http://localhost:4001 \
          -- node {{.REPO_DIR}}/dist/index.js
        echo "Registered: claude mcp add ollama (user scope)"
        echo "Verify with: claude mcp list"

  setup-claude-desktop:
    desc: Write MCP config to Claude Desktop config
    cmds:
      - |
        python3 -c "
        import json, pathlib
        dist = '{{.REPO_DIR}}/dist/index.js'
        cfg_path = pathlib.Path.home() / 'Library' / 'Application Support' / 'Claude' / 'claude_desktop_config.json'
        cfg_path.parent.mkdir(parents=True, exist_ok=True)
        cfg = json.loads(cfg_path.read_text()) if cfg_path.exists() else {}
        cfg.setdefault('mcpServers', {})['ollama'] = {
          'command': 'node',
          'args': [dist],
          'env': {
            'OLLAMA_BASE_URL': 'http://localhost:11434',
            'ROUTER_BASE_URL': 'http://localhost:4001',
          },
        }
        cfg_path.write_text(json.dumps(cfg, indent=2))
        print('Written:', cfg_path)
        print('Restart Claude Desktop to pick up changes.')
        "

  setup-antigravity:
    desc: Write MCP config to Antigravity config
    cmds:
      - |
        python3 -c "
        import json, pathlib
        dist = '{{.REPO_DIR}}/dist/index.js'
        cfg_path = pathlib.Path('/Users/lvavasour/.gemini/antigravity/mcp_config.json')
        cfg = json.loads(cfg_path.read_text()) if cfg_path.exists() else {}
        cfg.setdefault('mcpServers', {})['ollama'] = {
          'command': 'node',
          'args': [dist],
          'env': {
            'OLLAMA_BASE_URL': 'http://localhost:11434',
            'ROUTER_BASE_URL': 'http://localhost:4001',
          },
        }
        cfg_path.write_text(json.dumps(cfg, indent=2))
        print('Written:', cfg_path)
        "

  # ─── Internal ─────────────────────────────────────────────────
  _wait-ollama:
    internal: true
    cmds:
      - |
        echo "Waiting for Ollama..."
        for i in $(seq 1 30); do
          if curl -sf {{.OLLAMA_URL}}/api/tags >/dev/null 2>&1; then
            echo "Ollama ready"
            exit 0
          fi
          echo "  attempt $i/30..."
          sleep 3
        done
        echo "ERROR: Ollama did not become ready after 90s (expected at {{.OLLAMA_URL}})"
        docker logs ollama --tail 20 2>/dev/null || true
        echo "If using native Ollama: ensure it is running on the host (Ollama.app or brew services)."
        exit 1
