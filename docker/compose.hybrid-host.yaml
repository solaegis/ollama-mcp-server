# Merge after docker/compose.yaml (default `task up`):
#   docker compose -f docker/compose.yaml -f docker/compose.hybrid-host.yaml ...
#
# Routes router, Open WebUI, model-puller, and Prometheus to native Ollama on the
# host at host.docker.internal:11434 (Metal on macOS). The ollama container is off
# unless --profile docker-ollama is used without this file.

services:
  router:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  open-webui:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

  model-puller:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_PULL_BASE=http://host.docker.internal:11434

  prometheus:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../config/prometheus.hybrid.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  metrics:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
