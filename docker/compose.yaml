name: ollama-stack

networks:
  ollama-net:
    driver: bridge

volumes:
  ollama-data:
  webui-data:
  prometheus-data:
  grafana-data:

services:
  # ─── LLM Runtime ──────────────────────────────────────────────
  # Opt-in: default stack uses native Ollama on the host (merge compose.hybrid-host.yaml).
  # Run with --profile docker-ollama (without hybrid merge) for Linux Ollama in-container.
  ollama:
    profiles: ["docker-ollama"]
    image: ollama/ollama:latest
    pull_policy: always
    container_name: ollama
    restart: unless-stopped
    networks: [ollama-net]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=3
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434' 2>/dev/null && exit 0 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  # ─── Smart Router ─────────────────────────────────────────────
  router:
    image: python:3.12-slim
    container_name: ollama-router
    restart: unless-stopped
    networks: [ollama-net]
    ports:
      - "4001:4001"
    volumes:
      - ../router:/app/router:ro
      - ../pyproject.toml:/app/pyproject.toml:ro
      - ../uv.lock:/app/uv.lock:ro
    working_dir: /app
    command: >
      sh -c "pip install -q uv &&
             uv sync --frozen --no-dev &&
             uv run uvicorn router.server:app --host 0.0.0.0 --port 4001"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/4001' 2>/dev/null && exit 0 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ─── Chat Web UI ───────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    networks: [ollama-net]
    ports:
      - "8080:8080"
    volumes:
      - webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-me-in-production}

  # ─── Model Puller ─────────────────────────────────────────────
  model-puller:
    image: curlimages/curl:latest
    container_name: model-puller
    restart: "no"
    networks: [ollama-net]
    environment:
      - MODELS=${DEFAULT_MODELS:-qwen2.5-coder:7b,nomic-embed-text:latest,gemma4:latest,phi4:latest,qwen2.5-coder:14b,deepseek-coder:33b}
      - OLLAMA_PULL_BASE=http://ollama:11434
    entrypoint:
      - sh
      - -c
      - |
        BASE="$${OLLAMA_PULL_BASE:-http://ollama:11434}"
        echo "Waiting for Ollama at $$BASE..."
        for j in $$(seq 1 60); do
          if curl -sf --max-time 3 "$$BASE/api/tags" >/dev/null 2>&1; then
            break
          fi
          echo "  attempt $$j/60..."
          sleep 2
        done
        if ! curl -sf --max-time 3 "$$BASE/api/tags" >/dev/null 2>&1; then
          echo "ERROR: Ollama not reachable at $$BASE"
          exit 1
        fi
        for m in $$(echo "$$MODELS" | tr ',' ' '); do
          echo "Pulling $$m..."
          curl -sf -X POST "$$BASE/api/pull" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$$m\",\"stream\":false}" | grep -o '"status":"[^"]*"'
          echo ""
        done
        echo "Model pull complete"

  # ─── Metrics ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks: [ollama-net]
    ports:
      - "9090:9090"
    volumes:
      - ../config/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks: [ollama-net]
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../config/grafana-datasource.yaml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ../config/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    depends_on: [prometheus]
